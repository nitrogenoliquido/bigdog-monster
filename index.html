<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="big dog">
    <meta property="og:image" content="https://raw.githubusercontent.com/nitrogenoliquido/bigdog-monster/main/bigdogmonster.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="big dog">
    <meta name="theme-color" content="#2f3136">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="big dog">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/nitrogenoliquido/bigdog-monster/main/bigdogmonster.png">
    <title>big dog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .embed {
            background-color: #2f3136;
            border-left: 4px solid #5865f2;
            border-radius: 4px;
            padding: 16px;
            max-width: 520px;
            width: 90%;
        }
        .embed-title {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .embed-image {
            width: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="embed">
        <div class="embed-title">big dog</div>
        <img class="embed-image" src="bigdogmonster.png" alt="big dog">
    </div>
</body>
</html>
